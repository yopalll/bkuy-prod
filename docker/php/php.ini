; BelajarKUY — production PHP overrides
expose_php = Off
memory_limit = 512M
max_execution_time = 120
max_input_time = 120

; Uploads — video melewati PHP (Standard Upload ke GCS), bukan Direct/Presigned URL.
; upload_max_filesize HARUS cukup menampung temp file video instruktur (s/d 500MB).
; post_max_size HARUS selalu > upload_max_filesize (tambah ~10% buffer).
upload_max_filesize = 1G
post_max_size = 1100M

; Timeout diperpanjang agar upload video besar via koneksi lambat tidak timeout.
max_execution_time = 600
max_input_time = 600

; Sessions handled by Laravel (redis); keep PHP defaults out of the way
date.timezone = Asia/Jakarta

; --- OPcache (code is immutable inside the image) ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; Realpath cache (perf)
realpath_cache_size = 4096K
realpath_cache_ttl = 600
