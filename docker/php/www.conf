; ==============================================================================
; BelajarKUY — PHP-FPM overrides (menggantikan zz-docker.conf bawaan image).
; WAJIB menyertakan ulang daemonize + listen agar container tidak exit.
; ==============================================================================

[global]
; Wajib: tanpa ini PHP-FPM daemonize dan container langsung exit.
daemonize = no

[www]
; Wajib: tanpa ini Nginx tidak bisa connect ke app:9000.
listen = 9000
user = www-data
group = www-data

; Pool tuning — video instruktur (1GB) memblokir 1 worker hingga GCS selesai.
; Asumsi RAM 5GB: max_children 50 × ~60MB = ~3GB, sisanya untuk Nginx/MySQL/Redis.
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20

; Cegah memory leak ringan dari long-running process.
pm.max_requests = 500
